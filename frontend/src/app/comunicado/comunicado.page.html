<ion-content [scrollY]="true">

  <div class="floating-buttons">
    <button class="float-btn" (click)="goBack()">
      <ion-icon name="arrow-back-outline" class="seta-voltar"></ion-icon>
    </button>
    <button class="float-btn" (click)="compartilhar()">
      <ion-icon name="share-social-outline" class="seta-voltar"></ion-icon>
    </button>
  </div>

  <div class="hero-image-wrapper">
    <div class="carousel-container" (scroll)="onScroll($event)">
      <img *ngFor="let img of comunicado.imagens" [src]="img" [alt]="comunicado.titulo"
        class="hero-image carousel-slide">

      <div *ngIf="!comunicado.imagens || comunicado.imagens.length === 0"
        class="hero-image carousel-slide no-image-placeholder">
        <ion-icon name="megaphone-outline"></ion-icon>
      </div>
    </div>

    <div class="hero-overlay">
      <h1 class="hero-title">{{ comunicado.titulo }}</h1>
      <span class="hero-date" *ngIf="comunicado.data">
        <ion-icon name="calendar-outline" class="hero-date-icon"></ion-icon>
        {{ comunicado.data | date:'dd/MM/yyyy' }}
      </span>
    </div>

    <div class="carousel-dots" *ngIf="comunicado.imagens && comunicado.imagens.length > 1">
      <div class="dot" *ngFor="let img of comunicado.imagens; let i = index" [class.active]="i === imagemAtiva"></div>
    </div>
  </div>

  <div class="content-body">

    <div class="owner-card" (click)="irParaPerfilOng()">
      <img
        [src]="(comunicado.usuario_foto && comunicado.usuario_foto !== 'null') ? ('http://localhost:3000/uploads/' + comunicado.usuario_foto) : 'https://ionicframework.com/docs/img/demos/avatar.svg'"
        (error)="$any($event.target).src = 'https://ionicframework.com/docs/img/demos/avatar.svg'" alt="Foto do Criador"
        class="owner-avatar owner-avatar--ong">

      <div class="owner-info">
        <span class="owner-label">{{ comunicado.tipo_usuario === 'ong' ? 'ONG Responsável' : 'Publicado por' }}</span>
        <span class="owner-name">{{ comunicado.usuario_nome || 'Usuário Desconhecido' }}</span>
      </div>
      <ion-icon name="chevron-forward-outline" class="ong-arrow"></ion-icon>
    </div>

    <div class="section">
      <h2 class="section-title">Comunicado</h2>
      <p class="section-text">{{ comunicado.texto }}</p>
    </div>

  </div>

</ion-content>
